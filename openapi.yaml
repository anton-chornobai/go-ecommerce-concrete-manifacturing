openapi: 3.2.0
info:
  title: Beton OpenAPI
  version: 1.0.0
  summary: This OpenAPI provides instruction how to use backend handles
servers:
  - url: http://localhost:8080
    description: Local development server (backend server)
tags:
  - name: Auth
    summary: Authentication and Autherization for the users and staff
    kind: audience and staff
  - name: Product
    description: Representig our product. Managment of the products also authorization for the admin panel.
    kind: audience and staff
  - name: Order
    description: Representig the orders of the clients also the orders of the staff (expenses, indirect incomes etc.)
    kind: audience and staff
  - name: Contact
    summary: Receiving contact info and desires from the clients
    kind: audience
paths:
  /v1/products:
    get:
      description: Returns all the products within the query params limit if the limit isnt set the limit by default is 20, user has access, such products which have status property - displayed. In order to have access the to the archived u should have admin role.
      parameters:
        - name: status
          in: querystring
          description: Filter products by status. Admins can pass "archived" to hidden catalog items.
          required: false
          schema:
            type: string
            enum: [displayed, archived]
            default: displayed

      operationId: Get Products
      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: not-found
          content:
            application/json:


components:
  schemas:
    Product:
      type: object
      required:
        - id
        - price
        - title
        - type
        - status
      properties:
        id:
          type: string
          format: uuid
          description: Unique internal identifier of the product
          example: 101
        price:
          type: integer
          description: Price in the lowest currency unit (e.g., cents or kopecks) to avoid floating-point issues
          example: 35000
        title:
          type: string
          description: Name of the concrete product or paving stone
          example: "Old Town Paving Stone"
        type:
          type: string
          description: Category or material classification type
          example: "paving_stone"
        color:
          type: string
          nullable: true
          description: Primary color scheme of the concrete unit
          example: "Granite Gray"
        status:
          $ref: "#/components/schemas/ProductStatus"
        image_urls:
          type: array
          description: Ordered list of product demonstration images
          items:
            $ref: "#/components/schemas/ProductImage"
        description:
          type: string
          nullable: true
          description: Expanded marketing or technical details about the product
          example: "High-durability concrete paving stone, perfect for walkways and driveways."
        stock_quantity:
          type: integer
          nullable: true
          description: Available stock units remaining in the warehouse inventory
          example: 1200
        weight:
          type: integer
          nullable: true
          description: Unit or batch weight measurements
          example: 45
        rating:
          type: integer
          nullable: true
          description: User evaluation metric
          example: 5
        size:
          $ref: "#/components/schemas/Size"
        created_at:
          type: string
          format: date-time
          description: Timestamp when the item was added to the catalog
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the catalog entry was last modified

    ProductStatus:
      type: string
      enum: [displayed, archived]
      example: "displayed"

    ProductImage:
      type: object
      required:
        - id
        - product_id
        - position
        - url
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique image asset ID
        product_id:
          type: integer
          description: Target product owner relationship ID
          example: 101
        position:
          type: integer
          description: Sorting priority index order for UI image galleries
          example: 1
        url:
          type: string
          format: uri
          description: Public CDN or server web address string for the image file
          example: "https://cdn.beton.com/images/old-town-gray.jpg"
        created_at:
          type: string
          format: date-time

    Size:
      type: object
      description: Dimensions blueprint schema mapping to your nested Go Size struct
      properties:
        length:
          type: integer
          example: 200
        width:
          type: integer
          example: 100
        thickness:
          type: integer
          example: 60
